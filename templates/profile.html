<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Music Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --highlight: #0f3460;
            --text: #eaeaea;
            --muted: #a0a0a0;
        }

        body {
            background-color: var(--primary);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Poppins', sans-serif;
        }

        .navbar {
            background: var(--secondary);
            padding: 16px 0;
        }

        .navbar-brand {
            color: var(--text) !important;
            font-weight: 700;
        }

        .profile-header {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            padding: 60px 0 40px;
            text-align: center;
            position: relative;
        }

        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            object-fit: cover;
            margin: 0 auto 20px;
            display: block;
        }

        .profile-avatar-placeholder {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            background: var(--highlight);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 3rem;
            color: var(--muted);
        }

        .profile-name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .profile-type {
            display: inline-block;
            background: var(--accent);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            text-transform: capitalize;
        }

        .profile-location {
            color: var(--muted);
            margin-top: 8px;
        }

        .profile-location i {
            color: var(--accent);
        }

        .profile-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .profile-card {
            background: var(--secondary);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--highlight);
        }

        .profile-card h3 {
            font-size: 1.25rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .profile-card h3 i {
            color: var(--accent);
        }

        .form-control {
            background: var(--primary);
            border: 2px solid var(--highlight);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
        }

        .form-control:focus {
            background: var(--primary);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(233, 69, 96, 0.2);
            color: var(--text);
        }

        .form-control::placeholder {
            color: var(--muted);
        }

        .form-label {
            color: var(--text);
            font-weight: 500;
            margin-bottom: 8px;
        }

        textarea.form-control {
            min-height: 120px;
            resize: vertical;
        }

        .btn-save {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-save:hover {
            background: #d13a52;
            color: white;
            transform: translateY(-2px);
        }

        .btn-message {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-message:hover {
            background: #d13a52;
            transform: translateY(-2px);
        }

        .btn-back {
            color: var(--muted);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .btn-back:hover {
            color: var(--text);
        }

        .genres-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        .tag {
            background: var(--highlight);
            color: var(--text);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .genre-tag {
            background: var(--highlight);
            color: var(--text);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .genre-tag:hover,
        .genre-tag.selected {
            background: var(--accent);
        }

        .success-message {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 16px 24px;
            border-radius: 10px;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--muted);
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar-small {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid var(--accent);
        }

        footer {
            background: var(--secondary);
            padding: 30px 0;
            text-align: center;
            margin-top: 60px;
        }

        footer a {
            color: var(--muted);
            text-decoration: none;
            margin: 0 12px;
        }

        footer a:hover {
            color: var(--accent);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--muted);
            color: var(--muted);
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <a class="navbar-brand" href="/">
                <i class="bi bi-music-note-beamed me-2" style="color: var(--accent);"></i>
                Music Connect
            </a>
            <div class="user-menu" id="userMenu">
                <a href="/" class="btn-back">
                    <i class="bi bi-house"></i> Home
                </a>
            </div>
        </div>
    </nav>

    <div class="profile-header">
        <div class="container text-center">
            <div id="avatarContainer" class="profile-avatar-placeholder" style="width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--accent); background: var(--highlight); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 3rem; color: var(--muted);">
                <i class="bi bi-person"></i>
            </div>
            <h1 class="profile-name" id="displayName">Loading...</h1>
            <span class="profile-type" id="displayType">-</span>
<p class="profile-location" id="displayLocation">
                <i class="bi bi-geo-alt-fill me-1"></i> -
            </p>
            <button id="messageBtn" class="btn-message" style="display: none; margin-top: 16px; border: none; cursor: pointer;" type="button">
                <i class="bi bi-chat-dots"></i> Message
            </button>
        </div>
    </div>

    <div class="profile-content">
            <div id="profileInfo">
                
                <div class="profile-card" id="section-instruments">
                    <h3><i class="bi bi-music-note-list"></i> Instruments / Skills</h3>
                    <div id="instrumentsContainer"></div>
                </div>
                <div class="profile-card">
                    <h3><i class="bi bi-music-note-list"></i> Genres</h3>
                    <div id="genresContainer"></div>
                </div>
            </div>
            
            <form id="profileForm">
            <div class="profile-card">
                <h3><i class="bi bi-person"></i> Basic Info</h3>
                <div class="row">
                    <div class="col-md-6">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" id="name" placeholder="Your name">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">I am a...</label>
                        <select class="form-control" id="userType">
                            <option value="musician">Musician</option>
                            <option value="producer">Producer</option>
                            <option value="band">Band</option>
                            <option value="venue">Venue</option>
                        </select>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-md-6">
                        <label class="form-label">Location</label>
                        <input type="text" class="form-control" id="location" placeholder="City, Country">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Avatar URL</label>
                        <input type="url" class="form-control" id="avatarUrl" placeholder="https://example.com/photo.jpg">
                    </div>
                </div>
            </div>

            <div class="profile-card">
                <h3><i class="bi bi-music-note-list"></i> Music Info</h3>
                <label class="form-label">Instruments / Skills</label>
                <input type="text" class="form-control" id="instruments" placeholder="Guitar, Piano, Vocals...">
                
                <label class="form-label mt-3">Genres</label>
                <div class="genres-tags" id="genresContainer">
                    <span class="genre-tag" data-genre="Rock">Rock</span>
                    <span class="genre-tag" data-genre="Jazz">Jazz</span>
                    <span class="genre-tag" data-genre="Electronic">Electronic</span>
                    <span class="genre-tag" data-genre="Hip Hop">Hip Hop</span>
                    <span class="genre-tag" data-genre="Classical">Classical</span>
                    <span class="genre-tag" data-genre="Indie">Indie</span>
                    <span class="genre-tag" data-genre="Metal">Metal</span>
                    <span class="genre-tag" data-genre="Pop">Pop</span>
                    <span class="genre-tag" data-genre="R&B">R&B</span>
                    <span class="genre-tag" data-genre="Blues">Blues</span>
                    <span class="genre-tag" data-genre="Folk">Folk</span>
                    <span class="genre-tag" data-genre="Reggae">Reggae</span>
                </div>
            </div>

            <div class="profile-card">
                <h3><i class="bi bi-file-text"></i> Bio</h3>
                <textarea class="form-control" id="bio" placeholder="Tell others about yourself, your musical journey, what you're looking for..."></textarea>
            </div>

            <button type="submit" class="btn btn-save">
                <i class="bi bi-check-lg me-2"></i> Save Profile
            </button>
            <button type="button" class="logout-btn ms-3" onclick="logout()">
                <i class="bi bi-box-arrow-right me-2"></i> Logout
            </button>
        </form>
    </div>

    <footer>
        <div class="container">
            <a href="/">Home</a>
            <a href="#">About</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentGenres = [];
        let viewOnly = false;
        let myUserId = null;

        async function loadProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const viewUserId = urlParams.get('id');
            
            let user;
            let isLoggedIn = false;
            
            try {
                if (viewUserId) {
                    // Viewing another user's profile
                    const response = await fetch(`/api/profile?id=${viewUserId}`);
                    const data = await response.json();
                    if (!data.user) {
                        window.location.href = '/';
                        return;
                    }
                    user = data.user;
                    viewOnly = true;
                    
                    // Check if logged in
                    try {
                        const meResponse = await fetch('/api/me');
                        const meData = await meResponse.json();
                        if (meData.user) {
                            isLoggedIn = true;
                            myUserId = meData.user.id;
                        }
                    } catch (err) {}
                } else {
                    // Viewing own profile - require login
                    const response = await fetch('/api/me');
                    const data = await response.json();
                    if (!data.user) {
                        window.location.href = '/';
                        return;
                    }
                    user = data.user;
                    isLoggedIn = true;
                    myUserId = user.id;
                }
            } catch (err) {
                window.location.href = '/';
                return;
            }
            
            if (!isLoggedIn) {
                // Not logged in - show read-only view, hide edit form
                document.getElementById('displayName').textContent = user.name || 'No name';
                document.getElementById('displayType').textContent = user.user_type || 'musician';
                document.getElementById('profileForm').style.display = 'none';
                
                if (user.location) {
                    document.getElementById('displayLocation').innerHTML = 
                        '<i class="bi bi-geo-alt-fill me-1"></i>' + user.location;
                }
                
                if (user.avatar_url) {
                    document.getElementById('avatarContainer').innerHTML = 
                        `<img src="${user.avatar_url}" alt="Profile" class="profile-avatar" id="profileAvatar" style="display: block; margin: 0 auto;">`;
                }
                
                populateReadOnlyInfo(user);
                return;
            }
            
            if (viewOnly && viewUserId != myUserId) {
                // Viewing other's profile - show read-only view with message button
                document.getElementById('displayName').textContent = user.name || 'No name';
                document.getElementById('displayType').textContent = user.user_type || 'musician';
                document.getElementById('messageBtn').style.display = 'inline-block';
                window.viewUserId = user.id;
                
                if (user.location) {
                    document.getElementById('displayLocation').innerHTML = 
                        '<i class="bi bi-geo-alt-fill me-1"></i>' + user.location;
                }
                
                if (user.avatar_url) {
                    document.getElementById('avatarContainer').innerHTML = 
                        `<img src="${user.avatar_url}" alt="Profile" class="profile-avatar" id="profileAvatar" style="display: block; margin: 0 auto;" onerror="this.style.display='none'; document.getElementById('avatarPlaceholder').style.display='flex';">` +
                        `<div class="profile-avatar-placeholder" id="avatarPlaceholder" style="display:none;"><i class="bi bi-person"></i></div>`;
                }

                if (user.bio) {
                    document.getElementById('bioContainer').innerHTML = `<p>${user.bio}</p>`;
                }
                document.getElementById('bioContainer').style.display = 'none';
                
                if (user.instruments) {
                    document.getElementById('instrumentsContainer').innerHTML = 
                        user.instruments.split(',').map(i => `<span class="tag">${i.trim()}</span>`).join('');
                } else {
                    document.getElementById('section-instruments').style.display = 'none';
                }
                
                if (user.genres) {
                    document.getElementById('genresContainer').innerHTML = 
                        user.genres.split(',').map(g => `<span class="tag">${g.trim()}</span>`).join('');
                } else {
                    document.getElementById('genresContainer').parentElement.style.display = 'none';
                }
                
                document.getElementById('profileForm').style.display = 'none';
                return;
            }
            
            document.getElementById('name').value = user.name || '';
            document.getElementById('userType').value = user.user_type || 'musician';
            document.getElementById('location').value = user.location || '';
            document.getElementById('avatarUrl').value = user.avatar_url || '';
            document.getElementById('instruments').value = user.instruments || '';
            document.getElementById('bio').value = user.bio || '';
            window.myUserId = user.id;
            
            document.getElementById('displayName').textContent = user.name || 'No name';
            document.getElementById('displayType').textContent = user.user_type || 'musician';
            
            if (user.location) {
                document.getElementById('displayLocation').innerHTML = 
                    '<i class="bi bi-geo-alt-fill me-1"></i>' + user.location;
            }
            
if (user.avatar_url) {
                    document.getElementById('avatarContainer').innerHTML = 
                        `<img src="${user.avatar_url}" alt="Profile" class="profile-avatar" id="profileAvatar" style="display: block; margin: 0 auto;" onerror="this.style.display='none'; document.getElementById('avatarPlaceholder').style.display='flex';">` +
                        `<div class="profile-avatar-placeholder" id="avatarPlaceholder" style="display:none;"><i class="bi bi-person"></i></div>`;
            }

            if (user.genres) {
                currentGenres = user.genres.split(',').map(g => g.trim()).filter(g => g);
                updateGenreTags();
            }
        }
        
        function populateReadOnlyInfo(user) {
            if (user.bio) {
                document.getElementById('bioContainer').innerHTML = `<p>${user.bio}</p>`;
            } else {
                document.getElementById('bioContainer').style.display = 'none';
            }
            
            if (user.instruments) {
                document.getElementById('instrumentsContainer').innerHTML = 
                    user.instruments.split(',').map(i => `<span class="tag">${i.trim()}</span>`).join('');
            } else {
                document.getElementById('section-instruments').style.display = 'none';
            }
            
            if (user.genres) {
                document.getElementById('genresContainer').innerHTML = 
                    user.genres.split(',').map(g => `<span class="tag">${g.trim()}</span>`).join('');
            } else {
                document.getElementById('genresContainer').parentElement.style.display = 'none';
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const profileData = {
                name: document.getElementById('name').value,
                user_type: document.getElementById('userType').value,
                location: document.getElementById('location').value,
                avatar_url: document.getElementById('avatarUrl').value,
                instruments: document.getElementById('instruments').value,
                bio: document.getElementById('bio').value,
                genres: currentGenres.join(', ')
            };

            try {
                const response = await fetch('/api/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(profileData)
                });

                const data = await response.json();
                
                if (data.error) {
                    alert('Error: ' + data.error);
                    return;
                }

                if (response.ok) {
                    window.myUserId = data.user.id;
                    document.getElementById('displayName').textContent = data.user.name;
                    document.getElementById('displayType').textContent = data.user.user_type;
                    document.getElementById('displayLocation').innerHTML = 
                        '<i class="bi bi-geo-alt-fill me-1"></i>' + (data.user.location || '-');

                    if (data.user.avatar_url) {
                        document.getElementById('avatarContainer').innerHTML = 
                            `<img src="${data.user.avatar_url}" alt="Profile" class="profile-avatar" id="profileAvatar" style="display: block; margin: 0 auto;">`;
                    }

                    showSuccess();
                }
            } catch (err) {
                console.error(err);
                alert('Failed to save profile: ' + err.message);
            }
        });

        function showSuccess() {
            const msg = document.getElementById('successMessage');
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 3000);
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/';
        }

        document.getElementById('avatarUrl').addEventListener('change', function() {
            if (this.value) {
                document.getElementById('avatarContainer').innerHTML = 
                    `<img src="${this.value}" alt="Profile" class="profile-avatar" id="profileAvatar" style="display: block; margin: 0 auto;" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<div class=\\'profile-avatar-placeholder\\'><i class=\\'bi bi-person\\'></i></div>');">`;
            }
        });

        function openMessage() {
            if (window.viewUserId) {
                window.location.href = '/messages?user=' + window.viewUserId;
            }
        }

        document.getElementById('messageBtn').addEventListener('click', function() {
            if (window.viewUserId) {
                window.location.href = '/messages?user=' + window.viewUserId;
            }
        });

        loadProfile();
    </script>
</body>
</html>
